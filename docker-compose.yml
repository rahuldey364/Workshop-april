version: '3.8'

services:
  rabbitmq-workshop:
    image: rabbitmq:3-management
    container_name: rabbitmq-workshop
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lognet

  service-a:
    build: ./service-a
    container_name: service-a
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq-workshop:5672
      - SERVICE_NAME=service-a
      - PORT=3001
    expose:
      - "3001"
    depends_on:
      rabbitmq-workshop:
        condition: service_healthy
    networks:
      - lognet

  service-b:
    build: ./service-b
    container_name: service-b
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq-workshop:5672
      - SERVICE_NAME=service-b
      - PORT=3002
    expose:
      - "3002"
    depends_on:
      rabbitmq-workshop:
        condition: service_healthy
    networks:
      - lognet

  consumer-error:
    build: ./consumer-error
    container_name: consumer-error
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq-workshop:5672
      - ROUTING_KEY=logs.error
      - PORT=4001
    ports:
      - "4001:4001"
    depends_on:
      rabbitmq-workshop:
        condition: service_healthy
    networks:
      - lognet

  consumer-warn:
    build: ./consumer-warn
    container_name: consumer-warn
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq-workshop:5672
      - ROUTING_KEY=logs.warn
      - PORT=4002
    ports:
      - "4002:4002"
    depends_on:
      rabbitmq-workshop:
        condition: service_healthy
    networks:
      - lognet

  consumer-info:
    build: ./consumer-info
    container_name: consumer-info
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq-workshop:5672
      - ROUTING_KEY=logs.info
      - PORT=4003
    ports:
      - "4003:4003"
    depends_on:
      rabbitmq-workshop:
        condition: service_healthy
    networks:
      - lognet

  dashboard:
    build: ./dashboard
    container_name: dashboard
    environment:
      - PORT=5000
      - CONSUMER_ERROR_URL=http://consumer-error:4001
      - CONSUMER_WARN_URL=http://consumer-warn:4002
      - CONSUMER_INFO_URL=http://consumer-info:4003
    expose:
      - "5000"
    depends_on:
      - consumer-error
      - consumer-warn
      - consumer-info
    networks:
      - lognet

  auth-service:
    build: ./auth-service
    container_name: auth-service
    environment:
      - PORT=4500
      - JWT_SECRET=x12@#kjhk^ytyfd
    expose:
      - "4500"
    networks:
      - lognet

  gateway:
    build: ./gateway
    container_name: gateway
    environment:
      - PORT=8080
      - AUTH_SERVICE_URL=http://auth-service:4500
      - JWT_SECRET=x12@#kjhk^ytyfd
    ports:
      - "8080:8080"
    depends_on:
      - auth-service
      - service-a
      - service-b
      - dashboard
    networks:
      - lognet

networks:
  lognet:
    driver: bridge