version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lognet

  service-a:
    build: ./service-a
    container_name: service-a
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - SERVICE_NAME=service-a
      - PORT=3001
    ports:
      - "3001:3001"
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - lognet

  service-b:
    build: ./service-b
    container_name: service-b
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - SERVICE_NAME=service-b
      - PORT=3002
    ports:
      - "3002:3002"
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - lognet

  consumer-error:
    build: ./consumer-error
    container_name: consumer-error
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - ROUTING_KEY=logs.error
      - PORT=4001
    ports:
      - "4001:4001"
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - lognet

  consumer-warn:
    build: ./consumer-warn
    container_name: consumer-warn
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - ROUTING_KEY=logs.warn
      - PORT=4002
    ports:
      - "4002:4002"
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - lognet

  consumer-info:
    build: ./consumer-info
    container_name: consumer-info
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - ROUTING_KEY=logs.info
      - PORT=4003
    ports:
      - "4003:4003"
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - lognet

  dashboard:
    build: ./dashboard
    container_name: dashboard
    environment:
      - PORT=5000
      - CONSUMER_ERROR_URL=http://consumer-error:4001
      - CONSUMER_WARN_URL=http://consumer-warn:4002
      - CONSUMER_INFO_URL=http://consumer-info:4003
    ports:
      - "5000:5000"
    depends_on:
      - consumer-error
      - consumer-warn
      - consumer-info
    networks:
      - lognet

networks:
  lognet:
    driver: bridge
